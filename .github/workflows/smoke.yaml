name: smoke

# Assembled-stack smoke test against the live demo (ticket 3.6). A full
# fresh-VM deploy does not fit free runners (4 vCPU/16 GB vs the stack's
# 12/48) — this runs both suites against demo.opensuite.online instead:
# on every main push, nightly, and on demand.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

# The authenticated suite drives the live demo (opens a document, cleans it up
# again). Two overlapping runs race each other's cleanup and leave stray files,
# so serialize: never run two smokes at once, and let an in-progress run finish
# rather than cancel it mid-cleanup.
concurrency:
  group: smoke-live-demo
  cancel-in-progress: false

env:
  SMOKE_DOMAIN: demo.opensuite.online

jobs:
  unauthenticated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash ci/smoke/smoke.sh "$SMOKE_DOMAIN"

  authenticated:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright
        run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium
      - name: Run authenticated smoke
        env:
          SMOKE_USER: ${{ secrets.SMOKE_USER || 'johndoe' }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: |
          if [ -z "$SMOKE_PASS" ]; then
            echo "SMOKE_PASS secret not set — authenticated smoke is required" >&2
            exit 2
          fi
          node ci/smoke/authenticated.mjs

  visual-transition-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Require live-demo credentials
        env:
          SMOKE_USER: johndoe
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: test -n "$SMOKE_USER" -a -n "$SMOKE_PASS" || { echo 'live-demo smoke secrets are required' >&2; exit 2; }
      - name: Install pinned Playwright
        run: npm i --no-save playwright@1.55.1 && npx playwright install --with-deps chromium
      - name: Run visual transitions
        env:
          SMOKE_USER: johndoe
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
          SMOKE_VISUAL_CONTRACT: ${{ vars.SMOKE_VISUAL_CONTRACT || 'baseline' }}
          SMOKE_WHITEBOARD_FILE: ${{ vars.SMOKE_WHITEBOARD_FILE }}
          SMOKE_OFFICE_FILE: ${{ vars.SMOKE_OFFICE_FILE }}
        run: node ci/smoke/visual-transitions.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-transition-results
          path: smoke-visual-artifacts
          retention-days: 7
          if-no-files-found: ignore
