name: meet-frontend image

# Build the Open Suite-patched La Suite Meet frontend (upstream at the pinned
# MEET_REF + patches/meet/*) and push it to GHCR so the deploy pulls a prebuilt
# image instead of building on the VPS (ticket 3.1). Tags: branch, short SHA,
# and the upstream ref (e.g. v1.20.0).
on:
  push:
    branches: [main]
    paths:
      - "patches/meet/**"
      - "overlays/portal-header/**"
      - ".github/workflows/meet-frontend-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "patches/meet/**"
      - "overlays/portal-header/**"
      - ".github/workflows/meet-frontend-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  MEET_REPO: https://github.com/suitenumerique/meet.git
  MEET_REF: v1.20.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Meet source and apply patches
        run: |
          git clone --depth 1 --branch "$MEET_REF" "$MEET_REPO" meet-src
          for p in patches/meet/*.patch; do
            [ -e "$p" ] || continue
            echo "==> Applying Meet patch: $(basename "$p")"
            git -C meet-src apply "../$p"
          done
          cp overlays/portal-header/opensuite-header.js \
            meet-src/src/frontend/public/opensuite-header.js

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-suite/meet-frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=${{ env.MEET_REF }}
      - uses: docker/build-push-action@v6
        with:
          context: ./meet-src
          file: ./meet-src/src/frontend/Dockerfile
          target: frontend-production
          build-args: |
            DOCKER_USER=101
          # Only push from the canonical repo (main / dispatch), never PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
