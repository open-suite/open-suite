name: nextcloud image

# Build the Open Suite Nextcloud image (pinned upstream + meetcal + patched
# user_oidc + official richdocuments + Whiteboard; see
# images/nextcloud/README.md) and push it to GHCR.
# Tags: the upstream base tag (e.g. 34.0.0-apache) and the commit sha.
on:
  push:
    branches: [main]
    paths:
      - "images/nextcloud/**"
      - ".github/workflows/nextcloud-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "images/nextcloud/**"
      - ".github/workflows/nextcloud-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NEXTCLOUD_TAG: 34.0.0-apache
  USER_OIDC_VERSION: v8.10.1
  RICHDOCUMENTS_VERSION: v11.0.1
  RICHDOCUMENTS_SHA256: 1952b5bfa0ddb24a4c125a9c28b12798a634a1263e88136d3244a86408c4c996
  WHITEBOARD_VERSION: v1.5.9
  WHITEBOARD_SHA256: 195e5d0b19fbb7e176bd2c89babfd5514aef0224afe5d0ef239304e84046a1fe

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch checksum-pinned Whiteboard release
        working-directory: images/nextcloud
        run: |
          curl -fsSL -o whiteboard.tar.gz \
            "https://github.com/nextcloud-releases/whiteboard/releases/download/${WHITEBOARD_VERSION}/whiteboard-${WHITEBOARD_VERSION}.tar.gz"
          echo "${WHITEBOARD_SHA256}  whiteboard.tar.gz" | sha256sum --check --strict
          tar xzf whiteboard.tar.gz && rm whiteboard.tar.gz
          test "$(sed -n 's:.*<version>\([^<]*\)</version>.*:\1:p' whiteboard/appinfo/info.xml)" = "${WHITEBOARD_VERSION#v}"
          grep -Fq '<nextcloud min-version="28" max-version="34"/>' whiteboard/appinfo/info.xml
          php -r '
            $manifest = json_decode(file_get_contents("whiteboard/appinfo/signature.json"), true, 512, JSON_THROW_ON_ERROR);
            $certificate = openssl_x509_parse($manifest["certificate"]);
            $infoHash = hash_file("sha512", "whiteboard/appinfo/info.xml");
            if (($certificate["subject"]["CN"] ?? null) !== "whiteboard"
              || !hash_equals($manifest["hashes"]["appinfo/info.xml"] ?? "", $infoHash)
              || empty($manifest["signature"])) { exit(1); }
          '

      - name: Fetch pinned user_oidc and richdocuments releases
        working-directory: images/nextcloud
        run: |
          curl -sfL -o user_oidc.tar.gz \
            "https://github.com/nextcloud-releases/user_oidc/releases/download/${USER_OIDC_VERSION}/user_oidc-${USER_OIDC_VERSION}.tar.gz"
          tar xzf user_oidc.tar.gz && rm user_oidc.tar.gz
          patch -p1 < patches/user-oidc-token-exchange-access-token.patch
          grep -q "token-type:access_token" user_oidc/lib/Service/TokenService.php
          ! grep -q "token-type:refresh_token'," user_oidc/lib/Service/TokenService.php

          curl -sfL -o richdocuments.tar.gz \
            "https://github.com/nextcloud-releases/richdocuments/releases/download/${RICHDOCUMENTS_VERSION}/richdocuments-${RICHDOCUMENTS_VERSION}.tar.gz"
          echo "${RICHDOCUMENTS_SHA256}  richdocuments.tar.gz" | sha256sum --check --strict
          tar xzf richdocuments.tar.gz && rm richdocuments.tar.gz
          bash test-richdocuments-package.sh richdocuments
          bash test-app-sync.sh richdocuments

      - name: Lint PHP sources
        working-directory: images/nextcloud
        run: |
          find meetcal user_oidc/lib richdocuments/lib whiteboard/lib -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify exact Whiteboard source and lifecycle contracts
        run: bash ci/test-nextcloud-whiteboard.sh

      - name: Build and verify the amd64 image artifact
        working-directory: images/nextcloud
        run: |
          docker build --pull \
            --build-arg "NEXTCLOUD_BASE=registry-1.docker.io/library/nextcloud:${NEXTCLOUD_TAG}" \
            --tag opensuite-nextcloud:whiteboard-test .
          bash test-image-whiteboard.sh opensuite-nextcloud:whiteboard-test

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-suite/nextcloud
          tags: |
            type=raw,value=${{ env.NEXTCLOUD_TAG }}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./images/nextcloud
          build-args: |
            NEXTCLOUD_BASE=registry-1.docker.io/library/nextcloud:${{ env.NEXTCLOUD_TAG }}
          # Only push from the canonical repo (main / dispatch), never PRs.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
