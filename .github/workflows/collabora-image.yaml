name: collabora image

# Build the Open Suite Collabora CODE image: a digest-pinned upstream runtime
# with the SmartMenus lifecycle source fix applied to its compiled browser
# bundle. Tags are the upstream version and the Open Suite commit SHA.
on:
  push:
    branches: [main]
    paths:
      - "images/collabora/**"
      - "ci/test-collabora-image-runtime.mjs"
      - ".github/workflows/collabora-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "images/collabora/**"
      - "ci/test-collabora-image-runtime.mjs"
      - ".github/workflows/collabora-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  COLLABORA_TAG: 26.04.1.4.1
  COLLABORA_BASE: registry-1.docker.io/collabora/code:26.04.1.4.1@sha256:75859dc9f9084d1877ce36cf96ec86600f495bade33289c9cbc27e0a0ee23b81
  COLLABORA_SOURCE_REF: 7d478de54b81a47d88ad4cf71180b9ceeb466848
  COLLABORA_SOURCE_SHA256: f1b6cdf521dc10d1ccc501516d9c1faa85ea590c7cf5cdfddbe50d0ff5f96ad5

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and verify the pinned Collabora source
        run: |
          source_root="$(mktemp -d)"
          source_file="${source_root}/browser/src/control/Control.Menubar.ts"
          mkdir -p "$(dirname "${source_file}")"
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/CollaboraOnline/online.mirror/${COLLABORA_SOURCE_REF}/browser/src/control/Control.Menubar.ts" \
            -o "${source_file}"
          echo "${COLLABORA_SOURCE_SHA256}  ${source_file}" | sha256sum --check --strict
          patch --directory="${source_root}" --strip=1 \
            < images/collabora/patches/smartmenus-lifecycle.patch
          node ci/test-collabora-image-runtime.mjs --verify-source "${source_file}"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-suite/collabora
          tags: |
            type=raw,value=${{ env.COLLABORA_TAG }},enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
      - name: Build amd64 contract candidate
        uses: docker/build-push-action@v6
        with:
          context: ./images/collabora
          build-args: |
            COLLABORA_BASE=${{ env.COLLABORA_BASE }}
          load: true
          tags: local/collabora-contract:amd64
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
      - name: Verify the amd64 runtime artifact
        run: >-
          node ci/test-collabora-image-runtime.mjs --verify-final-image
          "${COLLABORA_BASE}"
          local/collabora-contract:amd64
      - name: Build multi-arch release image
        uses: docker/build-push-action@v6
        with:
          context: ./images/collabora
          build-args: |
            COLLABORA_BASE=${{ env.COLLABORA_BASE }}
          # PRs build and inspect the exact image but never publish packages.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
