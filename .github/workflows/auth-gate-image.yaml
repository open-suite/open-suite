name: auth-gate image

# Build the Open Suite edge auth gate and push it to GHCR so the deploy pulls a
# prebuilt image instead of building on the VPS (ticket 3.1). Tags: branch, short
# SHA, and the git tag on release.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "overlays/auth-gate/**"
      - "scripts/single-vps-deploy/12-auth-gate.sh"
      - ".github/workflows/auth-gate-image.yaml"
  pull_request:
    branches: [main]
    paths:
      - "overlays/auth-gate/**"
      - "scripts/single-vps-deploy/12-auth-gate.sh"
      - ".github/workflows/auth-gate-image.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/open-suite/auth-gate
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: ./overlays/auth-gate
          # Only push from the canonical repo (main / tags), never PRs from forks.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
