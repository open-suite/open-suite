# Example outbound-relay secret for La Suite Messages' mta-out container.
#
# mta-out is Postfix with a smarthost: if SMTP_RELAY_HOST is set, it relays all
# outbound mail through that host instead of delivering directly (which a fresh
# VPS IP cannot do reliably — see docs/email/INTEGRATION.md and EMAIL-OPTIONS.md).
#
# The relay is provider-agnostic; only the host + credentials change. Values
# below are for Brevo (Sendinblue), a French, non-US provider. Swap for
# Sweego / Scaleway TEM / Mailjet by changing SMTP_RELAY_HOST and the creds.
#
# Do NOT commit real credentials. Create the real secret out-of-band, e.g.:
#   kubectl -n mb-messages create secret generic messages-mta-out-relay \
#     --from-literal=SMTP_RELAY_HOST='[smtp-relay.brevo.com]:587' \
#     --from-literal=SMTP_RELAY_USERNAME='<brevo-smtp-login>' \
#     --from-literal=SMTP_RELAY_PASSWORD='<brevo-smtp-key>'
apiVersion: v1
kind: Secret
metadata:
  name: messages-mta-out-relay
  namespace: mb-messages
type: Opaque
stringData:
  # Postfix relayhost syntax: [host]:port — brackets skip MX lookup.
  SMTP_RELAY_HOST: "[smtp-relay.brevo.com]:587"
  SMTP_RELAY_USERNAME: "REPLACE_ME_brevo_smtp_login"
  SMTP_RELAY_PASSWORD: "REPLACE_ME_brevo_smtp_key"
