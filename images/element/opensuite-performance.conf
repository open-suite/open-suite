# Element ships multi-megabyte JavaScript, CSS, and WebAssembly bundles. Serve
# the build-time gzip copies for content-hashed bundles and retain dynamic gzip
# for runtime-generated and other textual responses. Upstream cache rules stay
# authoritative.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml application/wasm;
gzip_static on;
