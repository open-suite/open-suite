# Element ships multi-megabyte JavaScript and CSS bundles. Compress textual
# responses dynamically; hashed assets remain governed by upstream cache rules.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml application/wasm;
